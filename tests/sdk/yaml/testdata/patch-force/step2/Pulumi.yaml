name: patch-force-test
runtime: yaml
description: |
  Updates the ConfigMap with enablePatchForce to resolve field conflicts.
variables: {}
outputs:
  namespace: ${ns.metadata.name}
  configmap: ${cm.metadata.name}
resources:
  provider:
    type: pulumi:providers:kubernetes
    properties:
      enableServerSideApply: true
      enablePatchForce: true
  ns:
    type: kubernetes:core/v1:Namespace
    options:
      provider: ${provider}
  cm:
    type: kubernetes:core/v1:ConfigMap
    properties:
      metadata:
        namespace: ${ns.metadata.name}
      data:
        key1: updated-value
    options:
      provider: ${provider}
