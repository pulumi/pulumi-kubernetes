name: patch-force-test
runtime: yaml
description: |
  Creates a ConfigMap using SSA without enablePatchForce, then applies a conflicting
  field manager to simulate a conflict scenario.
variables: {}
outputs:
  namespace: ${ns.metadata.name}
  configmap: ${cm.metadata.name}
resources:
  provider:
    type: pulumi:providers:kubernetes
    properties:
      enableServerSideApply: true
  ns:
    type: kubernetes:core/v1:Namespace
    options:
      provider: ${provider}
  cm:
    type: kubernetes:core/v1:ConfigMap
    properties:
      metadata:
        namespace: ${ns.metadata.name}
      data:
        key1: value1
    options:
      provider: ${provider}
