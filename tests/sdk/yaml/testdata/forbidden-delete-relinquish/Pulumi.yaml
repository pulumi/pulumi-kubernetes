name: forbidden-delete-relinquish
runtime: yaml
description: |
  Upserts the built-in "default" namespace with a test label, then
  destroy should succeed by relinquishing managed fields instead of
  failing with Forbidden.
resources:
  provider:
    type: pulumi:providers:kubernetes
    properties:
      upsertExistingObjects: true
  ns:
    type: kubernetes:core/v1:Namespace
    properties:
      metadata:
        name: default
        labels:
          pulumi-test-label: relinquish-test
    options:
      provider: ${provider}
