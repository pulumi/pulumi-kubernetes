name: secrets
runtime: yaml
description: Verifies the provider keeps secret-derived ConfigMap/Secret field values out of plaintext state.
config:
  message:
    type: string
    secret: true

resources:
  cmdata:
    type: kubernetes:core/v1:ConfigMap
    properties:
      data:
        password:
          fn::secret: ${message}

  cmbinarydata:
    type: kubernetes:core/v1:ConfigMap
    properties:
      binaryData:
        password:
          fn::secret:
            fn::toBase64: ${message}

  sstringdata:
    type: kubernetes:core/v1:Secret
    properties:
      stringData:
        password: ${message}

  sdata:
    type: kubernetes:core/v1:Secret
    properties:
      data:
        password:
          fn::toBase64: ${message}

  example:
    type: kubernetes:yaml/v2:ConfigGroup
    properties:
      yaml: |
        apiVersion: v1
        kind: Secret
        metadata:
          name: cg-secret
        stringData:
          password: ${message}

outputs:
  cmDataPassword: ${cmdata.data.password}
  cmBinaryDataPassword: ${cmbinarydata.binaryData.password}
  # sstringdata uses .data (the read-back base64 field), not .stringData
  # (write-only input that isn't in the resource output).
  sStringDataPassword: ${sstringdata.data.password}
  sDataPassword: ${sdata.data.password}
