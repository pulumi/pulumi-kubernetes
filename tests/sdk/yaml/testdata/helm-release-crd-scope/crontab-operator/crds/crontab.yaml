apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: scopedcrontabs.crd-scope.example.com
spec:
  group: crd-scope.example.com
  scope: Namespaced
  names:
    plural: scopedcrontabs
    singular: scopedcrontab
    kind: ScopedCronTab
    listKind: ScopedCronTabList
    shortNames:
    - ct
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              cronSpec:
                type: string
              image:
                type: string
              replicas:
                type: integer
