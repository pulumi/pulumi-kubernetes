name: rename-no-delete
runtime: yaml
description: Rename Configmap but same metadata.name
resources:
  ns:
    type: kubernetes:core/v1:Namespace
  configmap-renamed:
    type: kubernetes:core/v1:ConfigMap
    properties:
      metadata:
        name: rename-test
        namespace: ${ns.metadata.name}
      data:
        key: value
outputs:
  namespace: ${ns.metadata.name}
