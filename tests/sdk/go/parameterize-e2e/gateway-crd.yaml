apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gateways.gateway.pulumi.test
spec:
  # Non-protected group (anything not ending in .k8s.io / .kubernetes.io) so
  # kubectl apply doesn't require the api-approved.kubernetes.io annotation.
  group: gateway.pulumi.test
  names:
    plural: gateways
    singular: gateway
    kind: Gateway
    listKind: GatewayList
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                gatewayClassName:
                  type: string
                listeners:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      protocol:
                        type: string
                      port:
                        type: integer
